<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Effector Designer Pro v13.70</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<style>
    :root { 
        --bg: #f0f2f5; 
        --panel: #ffffff; 
        --panel-inset: #f8f9fa; 
        --accent: #2563eb; 
        --warn: #dc2626; 
        --text: #1e293b;
        --border: #e2e8f0;
        --btn-hover: #f1f5f9;
    }
    
    body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        margin: 0; 
        background: var(--bg); 
        color: var(--text); 
        display: flex; 
        flex-direction: column; 
        height: 100vh; 
        height: 100dvh; 
        width: 100vw;
        position: fixed; 
        top: 0; 
        left: 0;
        overflow: hidden; 
        transition: background 0.3s; 
    }
    
    body input, body select { background: #fff; color: var(--text); border: 1px solid #cbd5e1; outline: none; border-radius: 4px; padding: 6px; font-size: 13px; font-family: inherit; }
    body input:focus, body select:focus { border-color: var(--accent); }
    
    body.dark-mode { 
        --bg: #0f172a; 
        --panel: #1e293b; 
        --panel-inset: #0f172a; 
        --text: #f8fafc;
        --border: #334155;
        --btn-hover: #334155;
    }
    body.dark-mode input, body.dark-mode select { background: #0f172a; color: #f8fafc; border: 1px solid #475569; }
    
    #view-area { flex: 1; min-height: 0; position: relative; overflow: hidden; background: transparent; touch-action: none; }
    canvas { display: block; touch-action: none; width: 100%; height: 100%; }

    #control-panel { 
        background: var(--panel); 
        display: flex; flex-direction: column; 
        padding: 12px 12px max(16px, env(safe-area-inset-bottom)) 12px; 
        box-sizing: border-box; 
        border-top: 1px solid var(--border); 
        box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.05);
        flex: 0 0 auto; 
        z-index: 10;
    }
    
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; width: 100%; flex: 0 0 auto; }
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; margin-bottom: 8px; }
    .grid-5 button { height: 38px; font-size: 12px; padding: 4px; }
    
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; margin-bottom: 8px; }
    .grid-4 button { height: 38px; font-size: 12px; padding: 4px; }

    button { 
        padding: 8px 12px; 
        border-radius: 6px; 
        border: 1px solid transparent; 
        color: white; 
        font-size: 12px; 
        font-weight: 500; 
        cursor: pointer; 
        display: flex; justify-content: center; align-items: center; text-align: center; 
        font-family: inherit; transition: all 0.15s ease;
    }
    button:active { transform: scale(0.97); }

    .btn-default { background: var(--btn-hover); color: var(--text); border-color: var(--border); }
    .btn-default:hover { filter: brightness(0.95); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { background: var(--warn); color: white; }

    .tab-container { display: flex; gap: 4px; margin-bottom: 0; flex: 0 0 auto; width: 100%; }
    .mode-tab { 
        flex: 1; background: var(--btn-hover); color: var(--text); font-size: 12px; 
        padding: 10px 0; border-radius: 6px 6px 0 0; white-space: nowrap; 
        opacity: 0.7; border: 1px solid var(--border); border-bottom: none;
    }
    .mode-tab.active { opacity: 1; font-weight: 600; background: var(--panel-inset); color: var(--accent); border-bottom: 1px solid var(--panel-inset); margin-bottom: -1px; z-index: 1; }

    .mode-content-wrapper {
        background: var(--panel-inset); border: 1px solid var(--border); border-radius: 0 0 6px 6px; 
        padding: 12px; flex: 0 0 auto; margin-bottom: 12px;
    }
    .mode-content { display: none; }
    .mode-content.active { display: block; }

    .controls-main { display: flex; gap: 16px; justify-content: space-between; align-items: stretch; padding-top: 4px; }
    
    .d-pad { display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px); gap: 6px; align-content: center; flex: 0 0 auto; }
    .d-pad button { width: 52px; height: 52px; background: #64748b; font-size: 18px; border-radius: 8px; color: #fff; box-shadow: 0 2px 0 #475569; }
    .d-pad button:active { transform: translateY(2px); box-shadow: none; }
    .d-pad .action-btn { grid-column: 2; grid-row: 2; background: var(--accent); font-size: 12px; box-shadow: 0 2px 0 #1e40af; }

    .part-actions { flex: 1; display: flex; flex-direction: column; justify-content: space-between; gap: 8px; height: 168px; }
    
    .color-btn { height: 34px; border: 2px solid var(--border); border-radius: 4px; }
    .color-btn.active { border-color: var(--text); transform: scale(1.05); }

    .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; padding: 20px; box-sizing: border-box; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
    .modal-content { background: var(--panel); padding: 24px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; max-height: 90vh; overflow-y: auto; width: 100%; max-width: 440px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    .history-btn { background: var(--btn-hover); color: var(--text); width: 44px; font-size: 16px; border: 1px solid var(--border); }
    
    hr { border: none; border-top: 1px solid var(--border); width: 100%; margin: 8px 0; }
    label { font-size: 12px; font-weight: 500; color: var(--text); }

    .key-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .key-row:last-child { border-bottom: none; }
    .key-btn { background: var(--btn-hover); border: 1px solid var(--border); color: var(--text); padding: 4px 12px; border-radius: 4px; font-family: monospace; min-width: 80px; text-align: center; cursor: pointer; }
    .key-btn.listening { background: var(--accent); color: white; border-color: var(--accent); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div id="view-area"><canvas id="pcbCanvas"></canvas></div>

<div id="bomModal" class="modal">
    <div class="modal-content" style="height: 85%; max-width: 600px;">
        <h3 style="margin:0; font-size: 16px; color: var(--text);">BOM (Parts List)</h3>
        <textarea id="partListText" style="flex:1; background:var(--bg); color:var(--text); border:1px solid var(--border); padding:12px; font-family: monospace; font-size: 13px; border-radius: 4px; resize:none;" readonly></textarea>
        <div class="row" style="margin:0;">
            <button onclick="document.getElementById('partListText').select(); document.execCommand('copy'); setTimeout(() => alert('クリップボードにコピーしました'), 50);" class="btn-primary" style="flex:1;">コピー</button>
            <button onclick="closeBomModal()" class="btn-default" style="flex:1;">閉じる</button>
        </div>
    </div>
</div>

<div id="keyConfigModal" class="modal">
    <div class="modal-content" style="max-width: 360px;">
        <h3 style="margin:0; font-size: 16px; color: var(--text); text-align: center;">キーコンフィグ設定</h3>
        <div style="font-size: 11px; color: var(--text); text-align: center; opacity: 0.8; margin-bottom: 8px;">変更したいボタンをクリックして、新しいキーを押してください。</div>
        <div id="keyConfigList" style="flex:1; overflow-y:auto; border: 1px solid var(--border); padding: 0 12px; border-radius: 6px;"></div>
        <div style="display:flex; gap:8px; margin-top:12px;">
            <button onclick="resetKeyConfig()" class="btn-danger" style="flex:1;">初期値に戻す</button>
            <button onclick="closeKeyConfigModal()" class="btn-default" style="flex:1;">完了</button>
        </div>
    </div>
</div>

<div id="dataMenuModal" class="modal">
    <div class="modal-content">
        <h3 style="margin:0 0 8px 0; text-align:center; font-size: 16px; color: var(--text);">プロジェクト設定</h3>
        
        <label>プロジェクト名称</label>
        <input type="text" id="projectNameInput" value="My Custom OD" oninput="requestRender(); commitState();">
        
        <label style="margin-top: 4px;">基板サイズ</label>
        <div style="display:flex; gap:8px;">
            <select id="boardSizeSelect" onchange="changeBoardSize()" style="flex:1;">
                <option value="11,8">1590A</option>
                <option value="15,10" selected>1590B</option>
                <option value="21,13">125B</option>
                <option value="custom">カスタム</option>
            </select>
            <div id="customSizeDiv" style="display:none; align-items:center; gap:4px;">
                <input type="number" id="customX" value="15" style="width:48px;" onchange="changeBoardSize()"> ×
                <input type="number" id="customY" value="10" style="width:48px;" onchange="changeBoardSize()">
            </div>
        </div>

        <label style="margin-top: 4px;">基板ピッチ (全体表示サイズ)</label>
        <select id="gridPitchSelect" onchange="changeGridPitch()" style="width:100%;">
            <option value="0.5">極小 (5px基準)</option>
            <option value="0.75">小 (7.5px基準)</option>
            <option value="1.0" selected>標準 (10px基準)</option>
            <option value="1.5">中 (15px基準)</option>
            <option value="2.0">大 (20px基準)</option>
        </select>
        
        <hr>
        
        <div class="grid-5" style="grid-template-columns: 1fr 1fr;">
            <button onclick="toggleTheme()" class="btn-default">テーマ切替</button>
            <button onclick="openKeyConfigModal()" class="btn-default">キーコンフィグ</button>
            <button onclick="importImage()" class="btn-default">参照画像 読込</button>
            <button onclick="saveImage3View()" class="btn-default">3面図 出力</button>
            <button onclick="importData()" class="btn-default">データ 読込</button>
            <button onclick="openBomModal()" class="btn-default">BOM 出力</button>
        </div>
        
        <button onclick="saveFile('data')" class="btn-primary" style="margin-top: 4px; padding: 12px;">プロジェクトデータ 保存 (.json)</button>
        <button onclick="resetProject()" class="btn-danger" style="margin-top: 12px;">プロジェクト初期化</button>
        <button onclick="document.getElementById('dataMenuModal').style.display='none'" class="btn-default" style="margin-top: 4px;">閉じる</button>
    </div>
</div>

<div id="control-panel">
    <div class="row">
        <button onclick="undo()" class="history-btn">↩</button>
        <button onclick="redo()" class="history-btn">↪</button>
        <div style="flex:1;"></div>
        <button id="btnXray" onclick="toggleXray()" class="btn-default" style="min-width:60px;">透視</button>
        <button id="btnFlip" onclick="toggleFlip()" class="btn-default" style="min-width:60px;">裏面</button>
        <button id="btnImg" onclick="toggleView()" class="btn-default" style="min-width:60px;">画像</button>
        <button onclick="document.getElementById('dataMenuModal').style.display='flex'" class="btn-default" style="min-width:60px;">Menu</button>
    </div>

    <div class="tab-container">
        <button id="tabMove" class="mode-tab active" onclick="setUIMode('move')">部品配置</button>
        <button id="tabDraw" class="mode-tab" onclick="setUIMode('draw')">配線</button>
        <button id="tabSelect" class="mode-tab" onclick="setUIMode('select')">範囲選択</button>
        <button id="tabCheck" class="mode-tab" onclick="setUIMode('check')">検査</button>
    </div>

    <div class="mode-content-wrapper">
        <div id="move-tools" class="mode-content active">
            <div class="grid-4" style="margin-bottom:8px;">
                <button onclick="addPart('R')" style="background:#0f766e; color:#fff;">抵抗器</button>
                <button onclick="addPart('C_Box')" style="background:#ca8a04; color:#fff;">コンデンサ</button>
                <button onclick="addPart('D')" style="background:#be123c; color:#fff;">Diode</button>
                <button onclick="addPart('IC')" style="background:#334155; color:#fff;">IC / DIP</button>
            </div>
            <div class="grid-4" style="margin-bottom:0;">
                <button onclick="addPart('TR')" style="background:#475569; color:#fff;">TR</button>
                <button onclick="addPart('SW')" style="background:#b91c1c; color:#fff;">SW</button>
                <button onclick="addPart('Pad_POT')" style="background:#ea580c; color:#fff;">Pad</button>
                <button onclick="addPart('Others')" style="background:#4b5563; color:#fff;">Others</button>
            </div>
        </div>

        <div id="draw-tools" class="mode-content">
            <div class="grid-5" style="margin-bottom: 6px;">
                <button class="color-btn active" style="background:#dc2626" onclick="setWireColor('#dc2626', this)"></button>
                <button class="color-btn" style="background:#1e293b" onclick="setWireColor('#1e293b', this)"></button>
                <button class="color-btn" style="background:#16a34a" onclick="setWireColor('#16a34a', this)"></button>
                <button class="color-btn" style="background:#2563eb" onclick="setWireColor('#2563eb', this)"></button>
                <button class="color-btn" style="background:#9333ea" onclick="setWireColor('#9333ea', this)"></button>
            </div>
            <div class="grid-5">
                <button class="color-btn" style="background:#ca8a04" onclick="setWireColor('#ca8a04', this)"></button>
                <button class="color-btn" style="background:#ea580c" onclick="setWireColor('#ea580c', this)"></button>
                <button class="color-btn" style="background:#0891b2" onclick="setWireColor('#0891b2', this)"></button>
                <button class="color-btn" style="background:#db2777" onclick="setWireColor('#db2777', this)"></button>
                <button class="color-btn" style="background:#cbd5e1" onclick="setWireColor('#cbd5e1', this)"></button>
            </div>
        </div>

        <div id="select-tools" class="mode-content">
            <div style="text-align: center; color: var(--text); font-size: 12px; padding-top: 15px; line-height: 1.6;">
                <b style="color:var(--accent);">[決定]</b> で始点指定 → カーソル移動 → <b style="color:var(--accent);">[決定]</b><br>範囲内の部品と配線をまとめて選択
            </div>
        </div>

        <div id="check-tools" class="mode-content">
            <div id="check-results" style="padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; line-height: 1.5; min-height: 50px;"></div>
        </div>
    </div>

    <div class="controls-main">
        <div class="d-pad">
            <button style="grid-column:2; grid-row:1;" onclick="navMove(0,-10)">▲</button>
            <button style="grid-column:1; grid-row:2;" onclick="navMove(-10,0)">◀</button>
            <button class="action-btn" onclick="handleAction()">決定</button>
            <button style="grid-column:3; grid-row:2;" onclick="navMove(10,0)">▶</button>
            <button style="grid-column:2; grid-row:3;" onclick="navMove(0,10)">▼</button>
        </div>
        
        <div class="part-actions" id="part-actions-container"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('pcbCanvas');
    const ctx = canvas.getContext('2d');
    const GRID = 10;
    const COLORS = ["#000","#8B4513","#F00","#F80","#FF0","#080","#00F","#A0F","#888","#FFF"];

    const defaultKeyConfig = {
        up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight',
        action: 'Enter', rotate: 'r', delete: 'Delete',
        undo: 'z', redo: 'y', 
        modeMove: '1', modeDraw: '2', modeSelect: '3', modeCheck: '4',
        flip: 'f', xray: 'x'
    };

    const keyLabels = {
        up: '上に移動', down: '下に移動', left: '左に移動', right: '右に移動',
        action: '決定 / アクション', rotate: 'パーツ回転', delete: '選択削除 (BSも可)',
        undo: '元に戻す (Ctrl+)', redo: 'やり直し (Ctrl+)',
        modeMove: '部品配置モード', modeDraw: '配線モード', modeSelect: '範囲選択モード', modeCheck: '検査モード',
        flip: '裏面切替', xray: '透視切替'
    };

    let state = {
        mode: 'move', viewMode: 'pcb', xray: false, flipBoard: false, isDarkMode: false,
        zoom: 3, offsetX: 50, offsetY: 50, imgZoom: 1.0, imgPos: {x: 0, y: 0}, baseScale: 1.0,
        boardX: 15, boardY: 10, boardPos: {x: 0, y: 0}, cursor: {x: 0, y: 0},
        parts: [], lines: [], selectedPart: null, currentWire: null, selectedWire: null, wireColor: '#dc2626', bgImage: null,
        multiSelection: [], multiSelectedLines: [], selectStart: null,
        errors: [], currentErrorIndex: -1,
        keyConfig: { ...defaultKeyConfig }, listeningForKey: null
    };

    let historyManager = { past: [], future: [] };
    let lastSelectedPart = null; 

    function getSnapshot() { return JSON.stringify({ parts: state.parts, lines: state.lines, boardX: state.boardX, boardY: state.boardY, boardPos: state.boardPos, baseScale: state.baseScale }); }

    function commitState() {
        const snap = getSnapshot();
        if (historyManager.past.length === 0 || historyManager.past[historyManager.past.length - 1] !== snap) {
            historyManager.past.push(snap);
            if (historyManager.past.length > 50) historyManager.past.shift();
            historyManager.future = [];
            localStorage.setItem('effector_pro_backup', snap);
            localStorage.setItem('effector_pro_title', document.getElementById('projectNameInput').value);
        }
    }

    window.undo = () => { if (historyManager.past.length > 1) { historyManager.future.push(historyManager.past.pop()); loadSnapshot(historyManager.past[historyManager.past.length - 1]); requestRender(); localStorage.setItem('effector_pro_backup', getSnapshot()); } };
    window.redo = () => { if (historyManager.future.length > 0) { const snap = historyManager.future.pop(); historyManager.past.push(snap); loadSnapshot(snap); requestRender(); localStorage.setItem('effector_pro_backup', getSnapshot()); } };

    window.recalcPartGeometry = (p) => {
        if(p.type === 'R') { 
            p.pins=[{x:0,y:0},{x:p.span*10,y:0}]; 
            p.bbox={x:2, y:-4, w:p.span*10-4, h:8}; 
        } else if(p.type === 'R_Stand') { 
            p.pins=[{x:0,y:0},{x:p.span*10,y:0}]; 
            p.bbox={x:-5, y:-5, w:p.span*10+10, h:10}; 
        } else if(p.type === 'C_Box') { 
            p.pins=[{x:0,y:0},{x:p.span*10,y:0}]; 
            p.bbox={x:1, y:-5, w:p.span*10-2, h:10}; 
        } else if(p.type === 'C_Elect' || p.type === 'C_Ceramic' || p.type === 'C_Tantalum') { 
            p.pins=[{x:0,y:0},{x:p.span*10,y:0}]; 
            p.bbox={x:-3, y:-5, w:p.span*10+6, h:10}; 
        } else if(p.type === 'D' || p.type === 'D_Si') { 
            p.pins=[{x:0,y:0},{x:p.span*10,y:0}]; 
            p.bbox={x:2, y:-4, w:p.span*10-4, h:8}; 
        } else if(p.type === 'D_Stand' || p.type === 'D_Si_Stand') { 
            p.pins=[{x:0,y:0},{x:p.span*10,y:0}]; 
            p.bbox={x:-5, y:-5, w:p.span*10+10, h:10}; 
        } else if(p.type === 'IC') { 
            p.pins=[]; 
            for(let i=0; i<p.span; i++){ p.pins.push({x:0,y:i*10}); p.pins.push({x:30,y:i*10}); } 
            p.bbox={x:-4, y:-4, w:38, h:(p.span-1)*10+8}; 
        } else if(p.type === 'IC_SIP') { 
            p.pins=[]; 
            for(let i=0; i<p.span; i++){ p.pins.push({x:0,y:i*10}); } 
            p.bbox={x:-4, y:-4, w:18, h:(p.span-1)*10+8}; 
        } else if(p.type === 'DIP_SW') { 
            p.pins=[]; 
            for(let i=0; i<p.span; i++){ p.pins.push({x:0,y:i*10}); p.pins.push({x:30,y:i*10}); } 
            p.bbox={x:-4, y:-4, w:38, h:(p.span-1)*10+8}; 
        } else if(p.type === 'TR' || p.type === 'TR_MOSFET') { 
            p.pins=[];
            for(let i=0; i<=p.span; i++) p.pins.push({x:i*10, y:0});
            p.bbox={x:-2, y:-8, w:p.span*10+4, h:14}; 
        } else if(p.type === 'Pot') { 
            p.pins=[];
            for(let i=0; i<=p.span; i++) p.pins.push({x:i*10, y:0});
            p.bbox={x:0, y:-15, w:p.span*10, h:20}; 
        } else if(p.type === 'Trim') { 
            let apexX = Math.round(p.span / 2) * 10;
            p.pins=[{x:0,y:0}, {x:p.span*10,y:0}, {x:apexX, y:10}];
            p.bbox={x:-3, y:-5, w:p.span*10+6, h:18}; 
        } else if(p.type === 'SW') { 
            p.pins=[{x:0,y:0},{x:0,y:10},{x:0,y:20},{x:10,y:0},{x:10,y:10},{x:10,y:20}]; 
            p.bbox={x:-4, y:-4, w:18, h:28}; 
        } else if(p.type === 'Jump') { 
            p.pins=[{x:0,y:0},{x:p.span*10,y:0}]; 
            p.bbox={x:0, y:-2, w:p.span*10, h:4}; 
        } else if(p.type === 'Pad') {
            p.bbox={x:-5, y:-5, w:10, h:10}; 
        } else if(p.type === 'Custom') {
            p.span = p.span >= 0 ? p.span : 2; p.spanY = p.spanY >= 0 ? p.spanY : 2; 
            p.color = p.color || '#64748b'; p.pinLayout = p.pinLayout || 'corners';
            p.bbox = {x: -4, y: -4, w: p.span*10 + 8, h: p.spanY*10 + 8};
            
            let tempPins = [];
            if (p.pinLayout === 'corners') {
                tempPins.push({x:0, y:0}, {x:p.span*10, y:0}, {x:0, y:p.spanY*10}, {x:p.span*10, y:p.spanY*10});
            } else if (p.pinLayout === 'lr') {
                for(let i=0; i<=p.spanY; i++) { tempPins.push({x:0, y:i*10}); tempPins.push({x:p.span*10, y:i*10}); }
            } else if (p.pinLayout === 'tb') {
                for(let i=0; i<=p.span; i++) { tempPins.push({x:i*10, y:0}); tempPins.push({x:i*10, y:p.spanY*10}); }
            } else if (p.pinLayout === 'all') {
                for(let ix=0; ix<=p.span; ix++) {
                    for(let iy=0; iy<=p.spanY; iy++) {
                        if (ix===0 || ix===p.span || iy===0 || iy===p.spanY) tempPins.push({x:ix*10, y:iy*10});
                    }
                }
            }
            
            p.pins = [];
            let seen = new Set();
            for(let pin of tempPins) {
                let key = `${pin.x},${pin.y}`;
                if(!seen.has(key)) { seen.add(key); p.pins.push(pin); }
            }
        }
    };

    function loadSnapshot(snapStr) {
        try {
            const d = JSON.parse(snapStr);
            state.parts = d.parts || []; state.lines = d.lines || [];
            state.boardX = d.boardX || 15; state.boardY = d.boardY || 10; state.boardPos = d.boardPos || {x:0, y:0};
            state.baseScale = d.baseScale || 1.0;
            state.selectedPart = null; state.currentWire = null; state.selectedWire = null; 
            state.multiSelection = []; state.multiSelectedLines = []; state.selectStart = null;
            state.errors = []; state.currentErrorIndex = -1;
            
            const pitchSelect = document.getElementById('gridPitchSelect');
            if(pitchSelect) pitchSelect.value = state.baseScale.toString();

            state.parts.forEach(p => {
                if (p.type === 'IC8') { p.type = 'IC'; p.span = 4; }
                if (p.type === 'IC14') { p.type = 'IC'; p.span = 7; }
                if (p.type === 'IC_SIP8') { p.type = 'IC_SIP'; p.span = 8; }
                if (p.span === undefined) {
                    if (p.type === 'R') p.span = 3;
                    else if (p.type === 'C_Box') p.span = 3; 
                    else if (p.type === 'Jump') p.span = parseInt(p.label) || 2;
                    else if (['R_Stand','C_Elect','C_Ceramic','C_Tantalum','D_Stand','D_Si_Stand'].includes(p.type)) p.span = 1;
                    else if (p.type === 'D' || p.type === 'D_Si' || p.type === 'TR' || p.type === 'TR_MOSFET' || p.type === 'Pot' || p.type === 'Trim') p.span = 2;
                    else if (p.type === 'DIP_SW') p.span = 4;
                    else p.span = 2;
                    if (['R','C_Box','D','D_Si','Jump'].includes(p.type) && p.pins && p.pins.length >= 2) p.span = Math.round((p.pins[1].x - p.pins[0].x) / 10);
                }
                recalcPartGeometry(p);
            });

            document.getElementById('boardSizeSelect').value = 'custom';
            document.getElementById('customSizeDiv').style.display = 'flex';
            document.getElementById('customX').value = state.boardX; document.getElementById('customY').value = state.boardY;
        } catch(e) {}
    }

    function getResistorColors(val) {
        if(!val) return []; let n = val.toLowerCase().replace(/r| /g, "");
        if(n.includes('k')) n = parseFloat(n) * 1000; else if(n.includes('m')) n = parseFloat(n) * 1000000; else n = parseFloat(n);
        if(isNaN(n) || n <= 0) return [];
        let s = n.toString(); let sig1 = parseInt(s[0]), sig2 = parseInt(s[1] || "0"), mul = Math.floor(Math.log10(n)) - 1;
        return [COLORS[sig1], COLORS[sig2], COLORS[mul] || COLORS[0]];
    }

    function distToSegment(p, v, w) {
        const l2 = (w.x - v.x)**2 + (w.y - v.y)**2;
        if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    function getPinWorldCoords(p) {
        const coords = []; const cos = Math.cos(p.rot * Math.PI/2), sin = Math.sin(p.rot * Math.PI/2);
        p.pins.forEach(pin => { coords.push({ x: p.x + Math.round(pin.x * cos - pin.y * sin), y: p.y + Math.round(pin.x * sin + pin.y * cos) }); });
        return coords;
    }

    function checkKeyMatch(eKey, confKey) { if(!eKey || !confKey) return false; return eKey.toLowerCase() === confKey.toLowerCase(); }

    window.addEventListener('keydown', e => {
        const activeTag = document.activeElement.tagName;
        if (activeTag === 'INPUT' || activeTag === 'TEXTAREA' || activeTag === 'SELECT') return;
        if (state.listeningForKey) {
            e.preventDefault(); let key = e.key; if (key === ' ') key = 'Space';
            state.keyConfig[state.listeningForKey] = key; state.listeningForKey = null;
            localStorage.setItem('eff_pro_keys', JSON.stringify(state.keyConfig)); renderKeyConfigList(); return;
        }

        let key = e.key; if (key === ' ') key = 'Space';
        const isCtrl = e.ctrlKey || e.metaKey; 

        if (isCtrl) {
            if (checkKeyMatch(key, state.keyConfig.undo)) { e.preventDefault(); undo(); return; }
            if (checkKeyMatch(key, state.keyConfig.redo)) { e.preventDefault(); redo(); return; }
        }
        if ([state.keyConfig.up, state.keyConfig.down, state.keyConfig.left, state.keyConfig.right, state.keyConfig.action].some(k => checkKeyMatch(key, k)) || key === 'Backspace') { e.preventDefault(); }

        const handleDelete = () => { if (state.mode === 'select') deleteMultiSelected(); else if (state.mode === 'draw') deleteSelectedWire(); else deleteSelected(); };

        if (checkKeyMatch(key, state.keyConfig.up)) navMove(0, -10);
        else if (checkKeyMatch(key, state.keyConfig.down)) navMove(0, 10);
        else if (checkKeyMatch(key, state.keyConfig.left)) navMove(-10, 0);
        else if (checkKeyMatch(key, state.keyConfig.right)) navMove(10, 0);
        else if (checkKeyMatch(key, state.keyConfig.action)) handleAction();
        else if (checkKeyMatch(key, state.keyConfig.rotate)) rotateSelected();
        else if (checkKeyMatch(key, state.keyConfig.delete) || key === 'Backspace') handleDelete();
        else if (checkKeyMatch(key, state.keyConfig.modeMove)) setUIMode('move');
        else if (checkKeyMatch(key, state.keyConfig.modeDraw)) setUIMode('draw');
        else if (checkKeyMatch(key, state.keyConfig.modeSelect)) setUIMode('select');
        else if (checkKeyMatch(key, state.keyConfig.modeCheck)) setUIMode('check');
        else if (checkKeyMatch(key, state.keyConfig.flip)) toggleFlip();
        else if (checkKeyMatch(key, state.keyConfig.xray)) toggleXray();
    });

    let gpPrevState = { up: false, down: false, left: false, right: false, action: false, cancel: false };
    let gpCooldown = 0, gpInitialDelay = true;

    function gamepadLoop() {
        const gp = (navigator.getGamepads ? navigator.getGamepads() : [])[0];
        if (gp) {
            if (gpCooldown > 0) gpCooldown--;
            const threshold = 0.5;
            let up = gp.buttons[12]?.pressed || gp.axes[1] < -threshold; let down = gp.buttons[13]?.pressed || gp.axes[1] > threshold;
            let left = gp.buttons[14]?.pressed || gp.axes[0] < -threshold; let right = gp.buttons[15]?.pressed || gp.axes[0] > threshold;
            let action = gp.buttons[0]?.pressed; let cancel = gp.buttons[1]?.pressed;
            let moveX = 0, moveY = 0; if (up) moveY -= 10; if (down) moveY += 10; if (left) moveX -= 10; if (right) moveX += 10;

            if ((moveX !== 0 || moveY !== 0)) {
                if (gpCooldown === 0) { navMove(moveX, moveY); gpCooldown = gpInitialDelay ? 15 : 4; gpInitialDelay = false; }
            } else { gpInitialDelay = true; gpCooldown = 0; }

            if (action && !gpPrevState.action) { handleAction(); }
            if (cancel && !gpPrevState.cancel) {
                if (state.mode === 'select') clearSelection();
                else if (state.mode === 'draw') { state.currentWire = null; state.selectedWire = null; requestRender(); }
                else { state.selectedPart = null; updateInputUI(); requestRender(); }
            }
            gpPrevState = { up, down, left, right, action, cancel };
        }
        requestAnimationFrame(gamepadLoop);
    }

    window.openKeyConfigModal = () => { document.getElementById('dataMenuModal').style.display = 'none'; state.listeningForKey = null; renderKeyConfigList(); document.getElementById('keyConfigModal').style.display = 'flex'; };
    window.closeKeyConfigModal = () => { state.listeningForKey = null; document.getElementById('keyConfigModal').style.display = 'none'; document.getElementById('dataMenuModal').style.display = 'flex'; };
    window.listenForKey = (configKey) => { state.listeningForKey = configKey; renderKeyConfigList(); };
    window.resetKeyConfig = () => { if(confirm("初期値に戻しますか？")) { state.keyConfig = { ...defaultKeyConfig }; localStorage.setItem('eff_pro_keys', JSON.stringify(state.keyConfig)); state.listeningForKey = null; renderKeyConfigList(); } };

    function renderKeyConfigList() {
        const container = document.getElementById('keyConfigList'); container.innerHTML = '';
        for (const [key, label] of Object.entries(keyLabels)) {
            const row = document.createElement('div'); row.className = 'key-row';
            const nameDiv = document.createElement('div'); nameDiv.style.fontSize = '12px'; nameDiv.style.fontWeight = '500'; nameDiv.innerText = label;
            const btn = document.createElement('div'); btn.className = `key-btn ${state.listeningForKey === key ? 'listening' : ''}`;
            btn.innerText = state.listeningForKey === key ? '入力待ち...' : state.keyConfig[key]; btn.onclick = () => listenForKey(key);
            row.appendChild(nameDiv); row.appendChild(btn); container.appendChild(row);

    }

    let initialPinchDist = null, initialZoom = 1, lastPanX = 0, lastPanY = 0, isPanning = false;

    canvas.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            isPanning = false;
            initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            initialZoom = state.viewMode === 'image' ? state.imgZoom : state.zoom;
            lastPanX = (e.touches[0].clientX + e.touches[1].clientX)/2; lastPanY = (e.touches[0].clientY + e.touches[1].clientY)/2;
        } else if (e.touches.length === 1) {
            lastPanX = e.touches[0].clientX; lastPanY = e.touches[0].clientY;
            isPanning = true; 
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 2) {
            const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const scale = currentDist / initialPinchDist;
            if (state.viewMode === 'image') state.imgZoom = Math.max(0.1, Math.min(10, initialZoom * scale));
            else state.zoom = Math.max(1, Math.min(8, initialZoom * scale));
            const currentX = (e.touches[0].clientX + e.touches[1].clientX)/2, currentY = (e.touches[0].clientY + e.touches[1].clientY)/2;
            const dx = currentX - lastPanX, dy = currentY - lastPanY;
            if (state.viewMode === 'image') { state.imgPos.x += dx; state.imgPos.y += dy; } else { state.offsetX += dx; state.offsetY += dy; }
            lastPanX = currentX; lastPanY = currentY; requestRender();
        } else if (e.touches.length === 1 && isPanning) {
            const dx = e.touches[0].clientX - lastPanX, dy = e.touches[0].clientY - lastPanY;
            if(Math.abs(dx) > 2 || Math.abs(dy) > 2) {
                if (state.viewMode === 'image') { state.imgPos.x += dx; state.imgPos.y += dy; } else { state.offsetX += dx; state.offsetY += dy; }
                lastPanX = e.touches[0].clientX; lastPanY = e.touches[0].clientY; requestRender();
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchend', e => { if(isPanning && e.changedTouches.length === 1) handlePointerDown(e.changedTouches[0].clientX, e.changedTouches[0].clientY); isPanning = false; });
    canvas.addEventListener('mousedown', e => { lastPanX = e.clientX; lastPanY = e.clientY; isPanning = false; });
    canvas.addEventListener('mousemove', e => {
        if (e.buttons === 1) {
            isPanning = true; const dx = e.clientX - lastPanX, dy = e.clientY - lastPanY;
            if (state.viewMode === 'image') { state.imgPos.x += dx; state.imgPos.y += dy; } else { state.offsetX += dx; state.offsetY += dy; }
            lastPanX = e.clientX; lastPanY = e.clientY; requestRender();
        }
    });
    canvas.addEventListener('mouseup', e => { if(!isPanning) handlePointerDown(e.clientX, e.clientY); isPanning = false; });
    canvas.addEventListener('mouseleave', () => isPanning = false);

    function handlePointerDown(clientX, clientY) {
        if (state.viewMode === 'image') return;
        const rect = canvas.getBoundingClientRect();
        let worldX = (clientX - rect.left - state.offsetX) / (state.zoom * state.baseScale);
        let worldY = (clientY - rect.top - state.offsetY) / (state.zoom * state.baseScale);
        if (state.flipBoard) worldX = -worldX + (state.boardPos.x * 2 + state.boardX * GRID);

        let snapX = Math.round(worldX / GRID) * GRID;
        let snapY = Math.round(worldY / GRID) * GRID;

        if (state.mode === 'select') { state.cursor.x = snapX; state.cursor.y = snapY; requestRender(); return; }

        if (state.mode === 'draw' && !state.currentWire) {
            let hitWire = null;
            for (let l of state.lines) {
                for (let i = 0; i < l.points.length - 1; i++) if (distToSegment({x: worldX, y: worldY}, l.points[i], l.points[i+1]) < 8) { hitWire = l; break; }
                if(hitWire) break;
            }
            state.selectedWire = hitWire;
            if(!hitWire) { state.cursor.x = snapX; state.cursor.y = snapY; }
            requestRender(); return;
        }

        let clickedPart = null;
        for(let i = state.parts.length - 1; i >= 0; i--) {
            const p = state.parts[i]; const cos = Math.cos(p.rot * Math.PI/2), sin = Math.sin(p.rot * Math.PI/2);
            const localX = (worldX - p.x) * cos + (worldY - p.y) * sin; const localY = -(worldX - p.x) * sin + (worldY - p.y) * cos;
            if (localX >= p.bbox.x - 8 && localX <= p.bbox.x + p.bbox.w + 8 && localY >= p.bbox.y - 8 && localY <= p.bbox.y + p.bbox.h + 8) { clickedPart = p; break; }
        }

        if (clickedPart) { state.selectedPart = clickedPart; state.cursor.x = clickedPart.x; state.cursor.y = clickedPart.y; } 
        else {
            if (worldX >= state.boardPos.x - 5 && worldX <= state.boardPos.x + state.boardX * GRID + 5 && worldY >= state.boardPos.y - 5 && worldY <= state.boardPos.y + state.boardY * GRID + 5) { state.selectedPart = 'BOARD'; } 
            else { state.selectedPart = null; state.cursor.x = snapX; state.cursor.y = snapY; }
        }
        
        if (state.mode === 'check') runCheck();
        requestRender();
    }

    window.navMove = (dx, dy) => {
        if (state.viewMode === 'image') { state.imgPos.x += dx * 3; state.imgPos.y += dy * 3; requestRender(); return; }
        if (state.flipBoard) dx = -dx;

        state.cursor.x += dx; state.cursor.y += dy;
        const viewX = state.cursor.x * (state.zoom * state.baseScale) + state.offsetX, viewY = state.cursor.y * (state.zoom * state.baseScale) + state.offsetY;
        if(viewX < 20) state.offsetX += 50; if(viewX > canvas.width - 20) state.offsetX -= 50;
        if(viewY < 20) state.offsetY += 50; if(viewY > canvas.height - 20) state.offsetY -= 50;

        if (state.mode === 'select' && !state.selectStart && (state.multiSelection.length > 0 || state.multiSelectedLines.length > 0)) {
            state.multiSelection.forEach(p => { p.x += dx; p.y += dy; }); state.multiSelectedLines.forEach(l => { l.points.forEach(pt => { pt.x += dx; pt.y += dy; }); }); commitState();
        } else if (state.mode === 'move' && state.selectedPart) {
            if(state.selectedPart === 'BOARD') { state.boardPos.x += dx; state.boardPos.y += dy; } else { state.selectedPart.x = state.cursor.x; state.selectedPart.y = state.cursor.y; } commitState();
        } else if (state.mode === 'draw' && state.currentWire) {
            const pts = state.currentWire.points;
            if (pts.length > 1 && pts[pts.length-2].x === state.cursor.x && pts[pts.length-2].y === state.cursor.y) pts.pop();
            else if (!(pts[pts.length-1].x === state.cursor.x && pts[pts.length-1].y === state.cursor.y)) pts.push({...state.cursor});
        }
        if (state.mode === 'check') runCheck(); requestRender();
    };

    window.handleAction = () => {
        if (state.viewMode === 'image') return; 
        
        if (state.mode === 'select') {
            if (!state.selectStart) {
                state.selectStart = { x: state.cursor.x, y: state.cursor.y }; state.multiSelection = []; state.multiSelectedLines = [];
            } else {
                let x1 = Math.min(state.selectStart.x, state.cursor.x), x2 = Math.max(state.selectStart.x, state.cursor.x);
                let y1 = Math.min(state.selectStart.y, state.cursor.y), y2 = Math.max(state.selectStart.y, state.cursor.y);
                state.parts.forEach(p => { if (p === 'BOARD') return; if (p.x >= x1 && p.x <= x2 && p.y >= y1 && p.y <= y2) if (!state.multiSelection.includes(p)) state.multiSelection.push(p); });
                state.lines.forEach(l => { let allIn = true; for (let pt of l.points) { if (pt.x < x1 || pt.x > x2 || pt.y < y1 || pt.y > y2) { allIn = false; break; } } if (allIn && l.points.length > 0) if (!state.multiSelectedLines.includes(l)) state.multiSelectedLines.push(l); });
                state.selectStart = null;
            }
        } else if (state.mode === 'draw') {
            if(!state.currentWire) {
                let hitWire = state.lines.find(l => { for(let i=0; i<l.points.length-1; i++) if(distToSegment(state.cursor, l.points[i], l.points[i+1]) < 2) return true; return false; });
                if(hitWire && !state.selectedWire) { state.selectedWire = hitWire; } else { state.selectedWire = null; state.currentWire = { color: state.wireColor, points: [{...state.cursor}] }; }
            } else { 
                if(state.currentWire.points.length > 1) { 
                    let merged = false; const cw = state.currentWire, pFirst = cw.points[0], pLast = cw.points[cw.points.length - 1];
                    for(let i = 0; i < state.lines.length; i++) {
                        let l = state.lines[i]; if(l.color !== cw.color) continue;
                        const lFirst = l.points[0], lLast = l.points[l.points.length - 1];
                        if(pFirst.x === lLast.x && pFirst.y === lLast.y) { l.points = l.points.concat(cw.points.slice(1)); merged = true; break; } 
                        else if(pLast.x === lFirst.x && pLast.y === lFirst.y) { l.points = cw.points.slice(0, -1).concat(l.points); merged = true; break; } 
                        else if(pFirst.x === lFirst.x && pFirst.y === lFirst.y) { cw.points.reverse(); l.points = cw.points.slice(0, -1).concat(l.points); merged = true; break; } 
                        else if(pLast.x === lLast.x && pLast.y === lLast.y) { cw.points.reverse(); l.points = l.points.concat(cw.points.slice(1)); merged = true; break; }
                    }
                    if(!merged) { state.lines.push(state.currentWire); }
                    commitState(); 
                } 
                state.currentWire = null; 
            }
        } else {
            if(state.selectedPart) { state.selectedPart = null; } 
            else {
                const hit = state.parts.findLast(p => {
                    if(getPinWorldCoords(p).some(wp => wp.x === state.cursor.x && wp.y === state.cursor.y)) return true;
                    const cos = Math.cos(p.rot * Math.PI/2), sin = Math.sin(p.rot * Math.PI/2);
                    const lx = (state.cursor.x - p.x) * cos + (state.cursor.y - p.y) * sin, ly = -(state.cursor.x - p.x) * sin + (state.cursor.y - p.y) * cos;
                    return lx >= p.bbox.x && lx <= p.bbox.x + p.bbox.w && ly >= p.bbox.y && ly <= p.bbox.y + p.bbox.h;
                });
                if (hit) { state.selectedPart = hit; state.cursor.x = hit.x; state.cursor.y = hit.y; }
            }
        }
        if (state.mode === 'check') runCheck(); requestRender();
    };

    window.addPart = (type) => {
        const p = { type, x: state.cursor.x, y: state.cursor.y, rot: 0, label: '', pins: [], bbox: {x:0, y:0, w:10, h:10}, span: 2 };
        
        if(type==='R'){ p.label='10k'; p.span=3; } 
        else if(type==='C_Box'){ p.label='0.1u'; p.span=2; } 
        else if(type==='C_Elect'){ p.label='10u'; p.span=1; } 
        else if(type==='D'){ p.label='1N4148'; p.span=2; } 
        else if(type==='IC'){ p.label='IC'; p.span=4; } 
        else if(type==='TR'){ p.label='Q'; p.span=2; } 
        else if(type==='SW'){ p.label='DPDT'; p.span=1; }
        else if(type.startsWith('Pad_')) {
            p.type = 'Pad'; const padType = type.split('_')[1]; p.label = padType;
            const padColors = { '9V':'#e84118', 'GND':'#4cd137', 'IN':'#00a8ff', 'OUT':'#9c88ff', 'POT':'#ca8a04', 'SW-IN':'#00a8ff', 'SW-OUT':'#9c88ff' };
            p.color = padColors[padType] || '#94a3b8';
        }
        else if(type==='Others') { p.type='Pot'; p.label='100k B'; p.span=2; } // Othersは初期Pot

        recalcPartGeometry(p);

    window.applyDynamicInput = () => {
        if(!state.selectedPart) return;

        const padColor = document.getElementById('padColor'), customColor = document.getElementById('customColor'), customPinLayout = document.getElementById('customPinLayout');

        if (p.type === 'Pad' && padColor && txt) { p.color = padColor.value; p.label = txt.value; } 
        else if (p.type === 'Custom') {

        }

        else if (txt) p.label = txt.value;
        commitState(); if(state.mode==='check') runCheck(); requestRender();
    }

    window.runCheck = () => {
        state.errors = []; let allWirePoints = []; let allPinCoords = [];
        state.lines.forEach(l => l.points.forEach(pt => allWirePoints.push(pt)));
        state.parts.forEach(p => { getPinWorldCoords(p).forEach(c => allPinCoords.push({part: p, coord: c})); });

        let pinMap = {}; let aabbs = [];
        state.parts.forEach((p, idx) => {
            let worldCoords = getPinWorldCoords(p);
            worldCoords.forEach((c, pinIndex) => {
                let hasWire = allWirePoints.some(w => Math.hypot(w.x - c.x, w.y - c.y) < 2);
                let hasOtherPin = allPinCoords.some(op => op.part !== p && Math.hypot(op.coord.x - c.x, op.coord.y - c.y) < 2);
                if (!hasWire && !hasOtherPin) state.errors.push({ type: 'floating', msg: `${p.type}(${p.label || '無名'}) が未接続`, parts: [p], x: c.x, y: c.y });
                let key = `${c.x},${c.y}`; if(!pinMap[key]) pinMap[key] = []; pinMap[key].push({part: p});
            });

            if (p.type !== 'Jump' && p.type !== 'Pad') {
                const cos = Math.cos(p.rot * Math.PI/2), sin = Math.sin(p.rot * Math.PI/2);
                const corners = [ {x: p.bbox.x, y: p.bbox.y}, {x: p.bbox.x + p.bbox.w, y: p.bbox.y}, {x: p.bbox.x, y: p.bbox.y + p.bbox.h}, {x: p.bbox.x + p.bbox.w, y: p.bbox.y + p.bbox.h} ];
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                corners.forEach(c => { let wx = p.x + c.x * cos - c.y * sin, wy = p.y + c.x * sin + c.y * cos; if(wx < minX) minX = wx; if(wx > maxX) maxX = wx; if(wy < minY) minY = wy; if(wy > maxY) maxY = wy; });
                aabbs.push({part: p, minX: minX+0.1, maxX: maxX-0.1, minY: minY+0.1, maxY: maxY-0.1});
            }
        });

        for(let key in pinMap) { if(pinMap[key].length > 1) { let parts = pinMap[key].map(obj => obj.part); let [x, y] = key.split(',').map(Number); state.errors.push({ type: 'duplicate', msg: `同座標ピンの重複衝突`, parts: parts, x: x, y: y }); } }
        for (let i = 0; i < aabbs.length; i++) {
            for (let j = i + 1; j < aabbs.length; j++) {
                let a = aabbs[i], b = aabbs[j];
                if (a.minX < b.maxX && a.maxX > b.minX && a.minY < b.maxY && a.maxY > b.minY) state.errors.push({ type: 'overlap', msg: `${a.part.type} と ${b.part.type} の本体干渉`, parts: [a.part, b.part], x: (a.minX+a.maxX)/2, y: (a.minY+a.maxY)/2 });
            }
        }
        if(state.errors.length > 0) { if (state.currentErrorIndex < 0 || state.currentErrorIndex >= state.errors.length) state.currentErrorIndex = 0; } else { state.currentErrorIndex = -1; } updateCheckUI();
    };

    window.updateCheckUI = () => {
        let resDiv = document.getElementById('check-results'); if(!resDiv) return;
        if(state.errors.length === 0) { resDiv.innerHTML = '<div style="color:#059669; font-weight:600; text-align:center; padding-top:10px;">エラーなし (正常)</div>'; return; }
        let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><button onclick="prevError()" class="btn-default" style="padding:4px 8px; font-size:11px;">◀ 前</button><span style="color:#dc2626; font-weight:600; font-size:13px;">Error ${state.currentErrorIndex + 1} / ${state.errors.length}</span><button onclick="nextError()" class="btn-default" style="padding:4px 8px; font-size:11px;">次 ▶</button></div>`;
        let err = state.errors[state.currentErrorIndex]; html += `<div style="color:#fff; background:#dc2626; padding:8px; border-radius:4px; text-align:center; font-size:12px; font-weight:600;">${err.msg}</div>`; resDiv.innerHTML = html;
    };

    window.focusError = () => {
        if(state.errors.length === 0 || state.currentErrorIndex < 0) return; let err = state.errors[state.currentErrorIndex]; let targetX = err.x;
        if (state.flipBoard) targetX = -(err.x - (state.boardPos.x * 2 + state.boardX * GRID));
        state.offsetX = (canvas.width / 2) - targetX * (state.zoom * state.baseScale); state.offsetY = (canvas.height / 2) - err.y * (state.zoom * state.baseScale); requestRender(); updateCheckUI();
    };

    window.nextError = () => { if(state.errors.length === 0) return; state.currentErrorIndex = (state.currentErrorIndex + 1) % state.errors.length; focusError(); };
    window.prevError = () => { if(state.errors.length === 0) return; state.currentErrorIndex = (state.currentErrorIndex - 1 + state.errors.length) % state.errors.length; focusError(); };

    function drawCircuit(ctx, opt) {
        ctx.save();
        if (opt.flipBoard) { ctx.scale(-1, 1); ctx.translate(-(state.boardPos.x * 2 + state.boardX * GRID), 0); }

        ctx.fillStyle = !state.isDarkMode ? '#e5e7eb' : '#1e293b'; 
        ctx.fillRect(state.boardPos.x - 5, state.boardPos.y - 5, state.boardX*GRID + 10, state.boardY*GRID + 10);
        
        if(opt.showUI && state.selectedPart === 'BOARD') { ctx.strokeStyle = 'var(--accent)'; ctx.lineWidth = 2; ctx.strokeRect(state.boardPos.x - 5, state.boardPos.y - 5, state.boardX*GRID + 10, state.boardY*GRID + 10); }

        for(let ix=0; ix<=state.boardX; ix++) {
            for(let iy=0; iy<=state.boardY; iy++) {
                let bx = state.boardPos.x + ix*GRID, by = state.boardPos.y + iy*GRID;
                ctx.beginPath(); ctx.arc(bx, by, 1.5, 0, 7); ctx.fillStyle='#d97706'; ctx.fill(); 
                ctx.beginPath(); ctx.arc(bx, by, 0.5, 0, 7); ctx.fillStyle = !state.isDarkMode ? '#fff' : '#000'; ctx.fill(); 
            }
        }

        state.lines.concat(opt.currentWire ? [opt.currentWire] : []).forEach(l => {
            ctx.beginPath(); ctx.moveTo(l.points[0].x, l.points[0].y); l.points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.strokeStyle = !state.isDarkMode ? '#475569' : '#0f172a'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
            ctx.strokeStyle=l.color; ctx.lineWidth=1.5; ctx.stroke();
            if (opt.showUI && (l === state.selectedWire || state.multiSelectedLines.includes(l))) { ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=3; ctx.stroke(); }
        });

        if (opt.flipBoard && opt.xray) ctx.globalAlpha = 0.35;
        else if (opt.flipBoard && !opt.xray) ctx.globalAlpha = 0.0;
        else if (!opt.flipBoard && opt.xray) ctx.globalAlpha = 0.4;
        else ctx.globalAlpha = 1.0;
        
        let currentErrorParts = [];
        if (state.mode === 'check' && state.currentErrorIndex >= 0 && state.errors.length > 0 && opt.showUI) { currentErrorParts = state.errors[state.currentErrorIndex].parts; }

        if (ctx.globalAlpha > 0) {
            state.parts.forEach((p, idx) => {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI/2);
                
                if (currentErrorParts.includes(p)) {
                    ctx.save(); ctx.strokeStyle = 'rgba(220, 38, 38, 0.4)'; ctx.lineWidth = 6; ctx.lineJoin = 'round'; ctx.strokeRect(p.bbox.x - 3, p.bbox.y - 3, p.bbox.w + 6, p.bbox.h + 6);
                    ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2; ctx.strokeRect(p.bbox.x - 3, p.bbox.y - 3, p.bbox.w + 6, p.bbox.h + 6); ctx.restore();
                }

                if(opt.showUI) {
                    if(p === state.selectedPart) { ctx.strokeStyle='var(--accent)'; ctx.lineWidth=1; ctx.strokeRect(p.bbox.x - 2, p.bbox.y - 2, p.bbox.w + 4, p.bbox.h + 4); }
                    if(state.multiSelection.includes(p)) { ctx.strokeStyle='#059669'; ctx.lineWidth=2; ctx.strokeRect(p.bbox.x - 3, p.bbox.y - 3, p.bbox.w + 6, p.bbox.h + 6); }
                }
                
                ctx.fillStyle = !state.isDarkMode ? '#f8fafc' : '#334155'; ctx.lineWidth = 1; ctx.strokeStyle = !state.isDarkMode ? '#0f172a' : '#0f172a';

                if(p.type === 'R') {
                    ctx.strokeStyle = !state.isDarkMode ? '#94a3b8' : '#cbd5e1'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(p.span*10,0); ctx.stroke();
                    let startX = (p.span*10 - 24)/2;
                    ctx.fillStyle = '#fef08a'; ctx.fillRect(startX, -3, 24, 6); ctx.strokeRect(startX, -3, 24, 6);
                    const bands = getResistorColors(p.label); bands.forEach((c, i) => { ctx.fillStyle = c; ctx.fillRect(startX + 4 + i*4, -3, 2, 6); });
                } else if(p.type === 'R_Stand') {
                    ctx.fillStyle = '#fef08a'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, 7); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(p.span*10,0); ctx.stroke();
                } else if(p.type === 'C_Box') {
                    ctx.fillStyle = '#eab308'; ctx.fillRect(1, -4, p.span*10 - 2, 8); ctx.strokeRect(1, -4, p.span*10 - 2, 8);
                } else if(p.type === 'C_Elect') {
                    let val = parseFloat(p.label) || 10; let r = val >= 1000 ? 9 : (val >= 220 ? 7 : (val >= 47 ? 5.5 : 4.5));
                    ctx.strokeStyle = !state.isDarkMode ? '#94a3b8' : '#cbd5e1'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(p.span*10,0); ctx.stroke();
                    let cx = (p.span*10)/2;
                    ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.arc(cx, 0, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.arc(cx, 0, r, -Math.PI/2, Math.PI/2); ctx.fill();
                } else if(p.type === 'C_Ceramic') {
                    ctx.strokeStyle = !state.isDarkMode ? '#94a3b8' : '#cbd5e1'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(p.span*10,0); ctx.stroke();
                    let cx = (p.span*10)/2;
                    ctx.fillStyle = '#d97706'; ctx.beginPath(); ctx.ellipse(cx, 0, 7, 4, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                } else if(p.type === 'C_Tantalum') {
                    ctx.strokeStyle = !state.isDarkMode ? '#94a3b8' : '#cbd5e1'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(p.span*10,0); ctx.stroke();
                    let cx = (p.span*10)/2;
                    ctx.fillStyle='#0284c7'; ctx.beginPath(); ctx.moveTo(cx-5,0); ctx.quadraticCurveTo(cx,-8,cx+5,0); ctx.quadraticCurveTo(cx,3,cx-5,0); ctx.fill(); ctx.stroke();
                } else if(p.type === 'D' || p.type === 'D_Si') {
                    ctx.strokeStyle = !state.isDarkMode ? '#94a3b8' : '#cbd5e1'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(p.span*10,0); ctx.stroke();
                    let bodyW = p.type === 'D' ? 10 : 16; let startX = (p.span*10 - bodyW)/2;
                    ctx.fillStyle = p.type === 'D' ? '#dc2626' : '#020617'; ctx.fillRect(startX, -3, bodyW, 6); 
                    ctx.fillStyle = p.type === 'D' ? '#020617' : '#cbd5e1'; ctx.fillRect(startX + bodyW - 4, -3, 4, 6); 
                } else if(p.type === 'D_Stand' || p.type === 'D_Si_Stand') {
                    let colorMain = p.type === 'D_Stand' ? '#dc2626' : '#020617'; let colorBand = p.type === 'D_Stand' ? '#020617' : '#cbd5e1';
                    ctx.fillStyle = colorMain; ctx.beginPath(); ctx.arc(0, 0, 3.5, 0, 7); ctx.fill(); ctx.stroke(); 
                    ctx.fillStyle = colorBand; ctx.beginPath(); ctx.arc(0, 0, 3.5, -Math.PI/2, Math.PI/2); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(p.span*10,0); ctx.stroke();
                } else if(p.type === 'IC') {
                    let h = (p.span - 1) * 10 + 6; ctx.fillStyle = '#020617'; ctx.fillRect(-3, -3, 36, h);
                    ctx.fillStyle = '#475569'; ctx.beginPath(); ctx.arc(15, -3, 4, 0, Math.PI); ctx.fill(); ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(2, 2, 1, 0, 7); ctx.fill();
                } else if(p.type === 'IC_SIP') {
                    let h = (p.span - 1) * 10 + 6; ctx.fillStyle = '#020617'; ctx.fillRect(-3, -3, 16, h);
                    ctx.fillStyle = '#f8fafc'; ctx.beginPath(); ctx.arc(5, 2, 1.5, 0, 7); ctx.fill();
                } else if(p.type === 'DIP_SW') {
                    let h = (p.span - 1) * 10 + 10;
                    ctx.fillStyle = '#b91c1c'; ctx.fillRect(-2, -5, 34, h); 
                    for(let i=0; i<p.span; i++) {
                        ctx.fillStyle = '#f8fafc'; ctx.fillRect(4, i*10 - 2, 22, 6); 
                        ctx.fillStyle = '#94a3b8'; ctx.fillRect(16, i*10 - 2, 10, 6); 
                    }
                } else if(p.type === 'TR') {
                    ctx.fillStyle = '#020617'; ctx.beginPath(); ctx.arc((p.span*10)/2, -1, 6, Math.PI, 0); ctx.fill(); 
                } else if(p.type === 'TR_MOSFET') {
                    ctx.fillStyle = '#94a3b8'; ctx.fillRect(-2, -6, p.span*10 + 4, 6);
                    ctx.fillStyle = '#020617'; ctx.fillRect(0, -2, p.span*10, 8);
                    ctx.fillStyle = '#f8fafc'; ctx.beginPath(); ctx.arc((p.span*10)/2, -3, 1.5, 0, 7); ctx.fill();
                } else if(p.type === 'Pot') {
                    ctx.fillStyle = '#64748b'; ctx.beginPath(); ctx.arc((p.span*10)/2, -5, 8, 0, 7); ctx.fill(); ctx.stroke(); 
                    ctx.fillStyle = '#020617'; ctx.fillRect((p.span*10)/2 - 2, -5, 4, 10);
                } else if(p.type === 'Trim') {
                    ctx.fillStyle = '#0284c7'; ctx.fillRect(-2, -4, p.span*10 + 4, 18); ctx.strokeRect(-2, -4, p.span*10 + 4, 18);
                    ctx.fillStyle = '#f1f5f9'; ctx.beginPath(); ctx.arc(p.span*5, 5, 5, 0, 7); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#020617'; ctx.fillRect(p.span*5 - 1, 3, 2, 4);
                } else if(p.type === 'SW') {
                    ctx.fillStyle = '#b91c1c'; ctx.fillRect(-2, -2, 14, 24); ctx.strokeRect(-2, -2, 14, 24);
                } else if(p.type === 'Jump') {
                    ctx.strokeStyle = !state.isDarkMode ? '#94a3b8' : '#cbd5e1'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(p.span*10,0); ctx.stroke();
                } else if(p.type === 'Pad') {
                    ctx.fillStyle = p.color; ctx.fillRect(-4, -4, 8, 8);
                } else if(p.type === 'Custom') {
                    ctx.fillStyle = p.color; ctx.fillRect(-2, -2, p.span*10 + 4, p.spanY*10 + 4);
                    ctx.strokeStyle = !state.isDarkMode ? '#0f172a' : '#f8fafc'; ctx.strokeRect(-2, -2, p.span*10 + 4, p.spanY*10 + 4);
                }

                ctx.globalAlpha = opt.xray ? 0.4 : 1.0;
                if (opt.flipBoard && opt.xray) ctx.globalAlpha = 0.35;

                if(p.type !== 'Jump') {
                    let tColor = '#000';
                    if (['C_Elect', 'C_Tantalum', 'D', 'D_Stand', 'D_Si', 'D_Si_Stand', 'IC', 'IC_SIP', 'DIP_SW', 'TR', 'TR_MOSFET', 'Pot', 'Trim', 'SW'].includes(p.type)) { tColor = '#fff'; } 
                    else if (p.type === 'Pad' || p.type === 'Custom') { 
                        let hex = p.color.replace('#', ''); if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
                        let r = parseInt(hex.substr(0, 2), 16), g = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16);
                        tColor = (((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128) ? '#000' : '#fff';
                    }
                    
                    ctx.fillStyle = tColor; ctx.font = 'bold 4px sans-serif'; ctx.textAlign='center'; 
                    ctx.save();
                    
                    let cx = p.bbox.x + p.bbox.w / 2;
                    let cy = p.bbox.y + p.bbox.h / 2;
                    if(p.type === 'Pot') { cy = -15; }
                    if(p.type === 'Trim') { cy = 5; cx = p.span*5; }
                    if(p.type === 'SW') { cy = -5; }
                    if(p.type === 'TR' || p.type === 'TR_MOSFET') { cy = 4; }
                    
                    ctx.translate(cx, cy); ctx.rotate(-p.rot * Math.PI/2); ctx.fillText(p.label, 0, 1.5); ctx.restore();
                }
                ctx.restore();
            });
        }

        ctx.globalAlpha = 1.0;
        state.parts.forEach(p => {
            p.pins.forEach(pn => { 
                let worldX = p.x + Math.round(pn.x * Math.cos(p.rot * Math.PI/2) - pn.y * Math.sin(p.rot * Math.PI/2));
                let worldY = p.y + Math.round(pn.x * Math.sin(p.rot * Math.PI/2) + pn.y * Math.cos(p.rot * Math.PI/2));
                ctx.beginPath(); ctx.arc(worldX, worldY, 1.2, 0, 7); ctx.fillStyle = !state.isDarkMode ? '#94a3b8' : '#cbd5e1'; ctx.fill(); 
            });
        });

        if (state.mode === 'select' && state.selectStart && opt.showUI) {
            ctx.fillStyle = 'rgba(37, 99, 235, 0.1)'; ctx.strokeStyle = 'var(--accent)'; ctx.lineWidth = 1; ctx.setLineDash([2, 2]);
            let x = state.selectStart.x, y = state.selectStart.y, w = state.cursor.x - x, h = state.cursor.y - y;
            ctx.fillRect(x, y, w, h); ctx.strokeRect(x, y, w, h); ctx.setLineDash([]);
        }

        if (opt.showUI) { ctx.strokeStyle = !state.isDarkMode ? '#000' : '#fff'; ctx.lineWidth=0.5; ctx.strokeRect(state.cursor.x-3, state.cursor.y-3, 6, 6); }
        ctx.restore();
    }

    function render() {
        if (lastSelectedPart !== state.selectedPart) { updateInputUI(); lastSelectedPart = state.selectedPart; }
        ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = state.isDarkMode ? 'var(--bg)' : 'var(--bg)'; ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (state.viewMode === 'image' && state.bgImage) {
            ctx.save(); ctx.translate(canvas.width/2 + state.imgPos.x, canvas.height/2 + state.imgPos.y); ctx.scale(state.imgZoom, state.imgZoom);
            ctx.drawImage(state.bgImage, -state.bgImage.width/2, -state.bgImage.height/2); ctx.restore(); drawHUD(); return;
        }
        ctx.save(); ctx.translate(state.offsetX, state.offsetY); ctx.scale(state.zoom * state.baseScale, state.zoom * state.baseScale);
        drawCircuit(ctx, { xray: state.xray, flipBoard: state.flipBoard, showUI: true, currentWire: state.currentWire }); ctx.restore(); drawHUD();
    }

    function drawHUD() {
        const title = document.getElementById('projectNameInput').value;
        if(title) {
            ctx.fillStyle = !state.isDarkMode ? 'rgba(255,255,255,0.8)' : 'rgba(15,23,42,0.8)'; ctx.fillRect(0, 0, ctx.measureText(title).width + 30, 30);
            ctx.fillStyle = !state.isDarkMode ? '#1e293b' : '#f8fafc'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left'; ctx.fillText(title, 15, 20);
        }
    }

    window.changeBoardSize = () => {
        const val = document.getElementById('boardSizeSelect').value; const customDiv = document.getElementById('customSizeDiv');
        if (val === 'custom') { customDiv.style.display = 'flex'; state.boardX = parseInt(document.getElementById('customX').value) || 15; state.boardY = parseInt(document.getElementById('customY').value) || 10; } 
        else { customDiv.style.display = 'none'; const s = val.split(','); state.boardX = parseInt(s[0]); state.boardY = parseInt(s[1]); } commitState(); requestRender();
    };
    
    window.importImage = () => {
        document.getElementById('dataMenuModal').style.display='none'; const input = document.createElement('input'); input.type='file'; input.accept='image/*';
        input.onchange = e => { 
            window.scrollTo(0, 0); const reader = new FileReader(); 
            reader.onload = f => { 
                const img = new Image(); 
                img.onload = () => { 
                    state.bgImage = img; state.viewMode = 'image'; 
                    const scale = Math.min((canvas.width * 0.8) / img.width, (canvas.height * 0.8) / img.height, 1.0);
                    state.imgZoom = scale; state.imgPos = {x:0, y:0}; updateTopButtons(); resize(); requestRender(); 
                    setTimeout(() => alert("参照画像を読み込みました。"), 50); 
                }; img.src = f.target.result; 
            }; reader.readAsDataURL(e.target.files[0]); 
        }; input.click();
    };

    window.saveImage3View = async () => {
        document.getElementById('dataMenuModal').style.display='none'; const title = document.getElementById('projectNameInput').value || 'effector_layout';
        const exportCanvas = document.createElement('canvas'); const eCtx = exportCanvas.getContext('2d');
        const scale = 2, margin = 40, boardW = state.boardX * GRID, boardH = state.boardY * GRID;
        const singleW = boardW + margin * 2, singleH = boardH + margin * 2 + 50; 
        
        exportCanvas.width = singleW * 3 * scale * state.baseScale; exportCanvas.height = singleH * scale * state.baseScale;
        eCtx.scale(scale * state.baseScale, scale * state.baseScale); eCtx.fillStyle = state.isDarkMode ? '#0f172a' : '#f0f2f5'; eCtx.fillRect(0, 0, singleW * 3, singleH);
        
        const views = [ { name: 'Component Side (表面)', xray: false, flipBoard: false, dx: 0 }, { name: 'X-Ray View (透視)', xray: true, flipBoard: false, dx: singleW }, { name: 'Solder Side (裏面)', xray: true, flipBoard: true, dx: singleW * 2 } ];
        const tempBoardPos = { ...state.boardPos }; state.boardPos = {x: 0, y: 0};
        state.parts.forEach(p => { p.x -= tempBoardPos.x; p.y -= tempBoardPos.y; }); state.lines.forEach(l => l.points.forEach(pt => { pt.x -= tempBoardPos.x; pt.y -= tempBoardPos.y; }));

        views.forEach(v => {
            eCtx.save(); eCtx.translate(v.dx, 0); eCtx.fillStyle = state.isDarkMode ? '#f8fafc' : '#1e293b'; eCtx.font = 'bold 16px sans-serif'; eCtx.textAlign = 'center'; eCtx.fillText(v.name, singleW / 2, 30);
            eCtx.translate(margin, margin + 40); drawCircuit(eCtx, { xray: v.xray, flipBoard: v.flipBoard, showUI: false }); eCtx.restore();
        });

        state.parts.forEach(p => { p.x += tempBoardPos.x; p.y += tempBoardPos.y; }); state.lines.forEach(l => l.points.forEach(pt => { pt.x += tempBoardPos.x; pt.y += tempBoardPos.y; })); state.boardPos = tempBoardPos;
        exportCanvas.toBlob(async (b) => { await triggerDownload(b, title + '_3view.png'); });
    };
    
    async function saveFile(type) {
        document.getElementById('dataMenuModal').style.display='none'; 
        const title = document.getElementById('projectNameInput').value || 'effector_layout';
        const dataStr = JSON.stringify({ projectName: title, parts: state.parts, lines: state.lines, boardX: state.boardX, boardY: state.boardY, boardPos: state.boardPos, baseScale: state.baseScale }); 
        const blob = new Blob([dataStr], { type: 'application/json' }); 
        await triggerDownload(blob, title + '.json'); 
    }
    
    async function triggerDownload(blob, defaultName) {
        if (window.showSaveFilePicker) { try { const handle = await window.showSaveFilePicker({ suggestedName: defaultName }); const writable = await handle.createWritable(); await writable.write(blob); await writable.close(); alert('保存しました。'); return; } catch(e) { if(e.name !== 'AbortError') console.error(e); return; } }
        const file = new File([blob], defaultName, { type: blob.type });
        if (navigator.canShare && navigator.canShare({ files: [file] })) { try { await navigator.share({ files: [file], title: 'Effector Layout Data' }); return; } catch (err) { if (err.name !== 'AbortError') console.error('Share failed:', err); } }
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = defaultName; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 100);
    }
    
    window.importData = () => {
        document.getElementById('dataMenuModal').style.display='none'; const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
        input.onchange = e => { 
            window.scrollTo(0, 0); const reader = new FileReader(); 
            reader.onload = f => { 
                try { 
                    const data = JSON.parse(f.target.result); 
                    if(data.projectName) document.getElementById('projectNameInput').value = data.projectName; 
                    state.parts = data.parts || []; state.lines = data.lines || []; state.boardX = data.boardX || 15; state.boardY = data.boardY || 10; state.boardPos = data.boardPos || {x:0, y:0}; 
                    state.baseScale = data.baseScale || 1.0;
                    state.selectedPart = null; state.currentWire = null; state.selectedWire = null; state.multiSelection = []; state.multiSelectedLines = []; state.selectStart = null; 
                    
                    const pitchSelect = document.getElementById('gridPitchSelect'); if(pitchSelect) pitchSelect.value = state.baseScale.toString();

                    state.parts.forEach(p => {
                        if (p.type === 'IC8') { p.type = 'IC'; p.span = 4; }
                        if (p.type === 'IC14') { p.type = 'IC'; p.span = 7; }
                        if (p.span === undefined) {
                            if (p.type === 'R' || p.type === 'C_Box') p.span = 3; 
                            else if (p.type === 'Jump') p.span = parseInt(p.label) || 2;
                            else if (p.type === 'DIP_SW') p.span = 4;
                            else p.span = 2;
                            if (['R','C_Box','D','D_Si','Jump'].includes(p.type) && p.pins && p.pins.length >= 2) p.span = Math.round((p.pins[1].x - p.pins[0].x) / 10);
                        }
                        recalcPartGeometry(p);
                    });

                    document.getElementById('boardSizeSelect').value = 'custom'; document.getElementById('customSizeDiv').style.display = 'flex'; document.getElementById('customX').value = state.boardX; document.getElementById('customY').value = state.boardY; 
                    commitState(); updateActionUI(); requestRender(); setTimeout(() => alert("データを読み込みました"), 50); 
                } catch(err) { setTimeout(() => alert("読込失敗"), 50); } 
            }; reader.readAsText(e.target.files[0]); 
        }; input.click();
    };
    
    window.openBomModal = () => {
        document.getElementById('dataMenuModal').style.display = 'none'; 
        let groups = {}; 
        state.parts.forEach(p => { 
            if(p.type !== 'Pad' && p.type !== 'Jump') { 
                let category = 'Other';
                if(p.type.startsWith('R')) category = 'Resistor (抵抗)'; else if(p.type.startsWith('C_')) category = 'Capacitor (コンデンサ)'; else if(p.type.startsWith('D')) category = 'Diode (ダイオード)'; else if(p.type.startsWith('IC')) category = 'IC (集積回路)'; else if(p.type.startsWith('TR')) category = 'Transistor / FET'; else if(p.type === 'Pot' || p.type === 'Trim') category = 'Potentiometer (可変抵抗)'; else if(p.type === 'SW' || p.type === 'DIP_SW') category = 'Switch (スイッチ)'; else if(p.type === 'Custom') category = 'Custom (カスタムパーツ)';
                if(!groups[category]) groups[category] = {}; let k = p.label || '無名'; groups[category][k] = (groups[category][k] || 0) + 1; 
            } 
        });
        let order = ['Resistor (抵抗)', 'Capacitor (コンデンサ)', 'Diode (ダイオード)', 'Transistor / FET', 'IC (集積回路)', 'Potentiometer (可変抵抗)', 'Switch (スイッチ)', 'Custom (カスタムパーツ)', 'Other'];
        let text = "--- BOM (Parts List) ---\n\n"; 
        order.forEach(cat => { if(groups[cat]) { let total = 0, itemsText = ""; for(let k in groups[cat]) { itemsText += `  ${k} : ${groups[cat][k]} 個\n`; total += groups[cat][k]; } text += `【${cat}】 計 ${total} 個\n${itemsText}\n`; } });
        document.getElementById('partListText').value = text; document.getElementById('bomModal').style.display='flex';
    };

    window.closeBomModal = () => { document.getElementById('bomModal').style.display = 'none'; document.getElementById('dataMenuModal').style.display = 'flex'; };
    document.getElementById('bomModal').addEventListener('click', function(e) { if(e.target === this) closeBomModal(); });
    document.getElementById('dataMenuModal').addEventListener('click', function(e) { if(e.target === this) this.style.display = 'none'; });
    document.getElementById('keyConfigModal').addEventListener('click', function(e) { if(e.target === this) closeKeyConfigModal(); });
    
    init();
</script>
